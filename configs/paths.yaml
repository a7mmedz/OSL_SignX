# Dataset path configuration. Edit this file to point to your dataset.
# All downstream configs inherit these paths via OmegaConf interpolation.

# Set the DATASET_ROOT environment variable to override this path.
# On the server: export DATASET_ROOT=/home/<user>/FYPproject
dataset_root: ${oc.env:DATASET_ROOT,/home/user/FYPproject}

# Word-level split (train / dev / test) — already signer-aware split
# Layout: final_split/{train,dev,test}/rgb/*.mp4
word_split_dir: ${dataset_root}/final_split

# Sentence-level videos (not yet split by signer)
# Layout: OSL-Sentences/OSL-Sentences/rgb_format/*.mp4
sentence_dir: ${dataset_root}/OSL-Sentences/OSL-Sentences/rgb_format

# Vocabulary and gloss annotation files (kept in repo)
vocab_file: data/gloss_vocab.txt
words_file: data/Words.txt
sentences_file: data/Sentences.txt
sentence_glosses_file: data/sentence_glosses.txt

# Output / working directories
output_dir: outputs
checkpoint_dir: outputs/checkpoints
log_dir: outputs/logs
cache_dir: outputs/cache
