# Stage 2: Video2Pose training.
# Freezes stage 1 and trains a ViT to predict the 2048-dim latent pose features from RGB.
defaults:
  - default

stage: 2
name: stage2_video2pose

model:
  vit_name: vit_base_patch16_224
  vit_pretrained: true
  vit_feature_dim: 768
  latent_dim: 512         # must match stage1 latent_dim
  temporal_pool: mean     # how to aggregate frame features before projection
  freeze_stage1: true
  stage1_checkpoint: outputs/checkpoints/stage1_pose2gloss/best.pt

loss:
  loss_type: mse          # MSE between predicted and ground-truth pose latent

train:
  epochs: 300
  batch_size: 16           # single 24 GB GPU; effective batch = 64 via grad_accum
  grad_accum_steps: 4      # effective batch = 16 × 4 = 64
  optimizer: adamw
  lr: 8.0e-4               # sqrt-scaled from 5e-4: 5e-4 × √(64/32) ≈ 7e-4 → 8e-4
  weight_decay: 0.01
  beta1: 0.9
  beta2: 0.999
  warmup_epochs: 8         # scaled from 10 with larger batch
  clip_grad_norm: 1.0

data:
  level: word
  shuffle: true
