# Stage 2: Video2Pose training.
# Freezes stage 1 and trains a ViT to predict the 2048-dim latent pose features from RGB.
defaults:
  - default

stage: 2
name: stage2_video2pose

model:
  vit_name: vit_base_patch16_224
  vit_pretrained: true
  vit_feature_dim: 768
  latent_dim: 2048
  temporal_pool: mean     # how to aggregate frame features before projection
  freeze_stage1: true
  stage1_checkpoint: outputs/checkpoints/stage1/best.pt

loss:
  loss_type: mse          # MSE between predicted and ground-truth pose latent

train:
  epochs: 300
  batch_size: 32
  grad_accum_steps: 1
  optimizer: adamw
  lr: 5.0e-4
  weight_decay: 0.01
  beta1: 0.9
  beta2: 0.999
  warmup_epochs: 10
  clip_grad_norm: 1.0

data:
  level: word
  shuffle: true
